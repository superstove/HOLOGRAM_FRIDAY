<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Monitoring System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #026e70;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            position: relative;
        }
        .header img {
            width: 30px;
            vertical-align: middle;
            margin-left: 10px;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        .selection {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
        }
        select {
            background-color: #026e70;
            color: white;
        }
        button {
            background-color: black;
            color: white;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
        .attendance-table {
            margin: 0 auto;
            width: 50%;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .attendance-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .attendance-table th, .attendance-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .attendance-table th {
            background-color: #026e70;
            color: white;
        }
        .video-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
        .video-container video {
            width: 30%;
            border-radius: 10px;
            border: 2px solid #026e70;
        }
    </style>
</head>
<body>
    <div class="header">
        ATTENDANCE MONITORING SYSTEM 📋
    </div>
    <div class="container">
        <div class="selection">
            <div>
                <label>Select Year:</label>
                <select>
                    <option>2021-25</option>
                    <option>2022-26</option>
                </select>
            </div>
            <div>
                <label>Select Department:</label>
                <select>
                    <option>Computer Science</option>
                    <option>Mechanical</option>
                    <option>Electronics</option>
                </select>
            </div>
            <div>
                <button onclick="startAttendance()">START</button>
                <button onclick="stopAttendance()">STOP</button>
                <button onclick="clearAttendance()">CLEAR</button>
            </div>
        </div>
        <div class="attendance-table">
            <table>
                <tr>
                    <th>Name</th>
                    <th>Time</th>
                </tr>
                <tbody id="attendance-list">
                    <tr>
                        <td>28_JOFIN JOJI</td>
                        <td>14:06:01</td>
                    </tr>
                    <tr>
                        <td>50_NEIL JOSEPH</td>
                        <td>14:08:17</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="video-container">
            <video autoplay></video>
        </div>
    </div>

    <script>
        function startAttendance() {
            alert('Attendance started!');
        }
        function stopAttendance() {
            alert('Attendance stopped!');
        }
        function clearAttendance() {
            document.getElementById('attendance-list').innerHTML = '';
        }
    </script>
</body>
</html>
